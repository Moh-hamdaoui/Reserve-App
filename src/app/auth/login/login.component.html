<div class="login-container">
  <h2>Connexion</h2>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
    <div class="form-group">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        formControlName="email"
        placeholder="votre@email.com"
        [class.error]="email?.invalid && email?.touched"
      >
      <div class="error-message" *ngIf="email?.invalid && email?.touched">
        <span *ngIf="email?.errors?.['required']">L'email est requis</span>
        <span *ngIf="email?.errors?.['email']">Format d'email invalide</span>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input
        type="password"
        id="password"
        formControlName="password"
        placeholder="Votre mot de passe"
        [class.error]="password?.invalid && password?.touched"
      >
      <div class="error-message" *ngIf="password?.invalid && password?.touched">
        <span *ngIf="password?.errors?.['required']">Le mot de passe est requis</span>
        <span *ngIf="password?.errors?.['minlength']">Minimum 6 caractères</span>
      </div>
    </div>

    <button type="submit" [disabled]="isLoading" class="login-btn">
      {{ isLoading ? 'Connexion...' : 'Se connecter' }}
    </button>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>
  </form>

  <p class="register-link">
    Pas encore de compte ? <a routerLink="/register">S'inscrire</a>
  </p>
</div>
